[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
# E+F match CI defaults; W and I available but existing code has violations
select = ["E", "F"]
ignore = ["E501"]  # long lines common in Blender property descriptions

[tool.pytest.ini_options]
testpaths = ["test"]
norecursedirs = ["test_templates", "reference_data", ".venv", ".git"]
addopts = "--tb=short"

[tool.coverage.run]
source = ["blender_importASE"]
omit = ["blender_importASE/node_networks/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 0
